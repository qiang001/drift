name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    name: Type & cargo check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Tauri's Rust crate transitively depends on webkit2gtk on linux even for
      # `cargo check`; without it the build aborts. We're not bundling here,
      # just typechecking, but the deps are still required for the build graph.
      - name: Install Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            build-essential

      - name: Install npm deps (skip xray fetch — not needed for check)
        run: npm ci --ignore-scripts

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Frontend build (vite)
        run: npx vite build

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test --all-targets
