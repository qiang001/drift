name: Build macOS

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x86_64
            label: Intel
          - runner: macos-14
            arch: aarch64
            label: AppleSilicon
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.label }} (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm deps (postinstall runs fetch-xray)
        run: npm ci

      - name: Verify xray binary downloaded
        shell: bash
        run: |
          echo "--- src-tauri/binaries/xray/ ---"
          ls -la src-tauri/binaries/xray/
          if [ ! -f src-tauri/binaries/xray/xray ]; then
            echo "xray missing — running fetch-xray manually"
            node scripts/fetch-xray.mjs
            ls -la src-tauri/binaries/xray/
          fi
          test -f src-tauri/binaries/xray/xray
          chmod +x src-tauri/binaries/xray/xray
          file src-tauri/binaries/xray/xray

      - name: Build Tauri app
        run: npm run tauri build

      - name: List bundle contents
        if: always()
        shell: bash
        run: |
          APP=$(find src-tauri/target/release/bundle/macos -name "*.app" -type d 2>/dev/null | head -1)
          echo "App: $APP"
          if [ -n "$APP" ]; then
            echo "--- Resources/ ---"
            ls -la "$APP/Contents/Resources/" || true
            echo "--- find xray ---"
            find "$APP/Contents/Resources" -name "xray*" -o -name "geo*" || true
          fi

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Drift-macOS-${{ matrix.label }}-${{ matrix.arch }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30
