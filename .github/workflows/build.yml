name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x86_64
            label: Intel
          - runner: macos-14
            arch: aarch64
            label: AppleSilicon
    runs-on: ${{ matrix.runner }}
    name: macOS ${{ matrix.label }} (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm deps (skip postinstall, we'll fetch xray manually)
        run: npm ci --ignore-scripts

      - name: Download xray binary (authenticated, avoids API rate limit)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -ex
          case "${{ matrix.arch }}" in
            x86_64)  ASSET="Xray-macos-64.zip" ;;
            aarch64) ASSET="Xray-macos-arm64-v8a.zip" ;;
            *) echo "Unknown arch ${{ matrix.arch }}"; exit 1 ;;
          esac
          URL=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/XTLS/Xray-core/releases/latest \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(next(a['browser_download_url'] for a in d['assets'] if a['name']=='$ASSET'))")
          echo "Asset URL: $URL"
          mkdir -p src-tauri/binaries/xray
          curl -fsSL "$URL" -o /tmp/xray.zip
          unzip -o /tmp/xray.zip -d src-tauri/binaries/xray/
          chmod +x src-tauri/binaries/xray/xray
          ls -la src-tauri/binaries/xray/
          file src-tauri/binaries/xray/xray

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Drift-macOS-${{ matrix.label }}-${{ matrix.arch }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30

  windows:
    runs-on: windows-latest
    name: Windows (x64)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm deps (skip postinstall, we'll fetch xray manually)
        run: npm ci --ignore-scripts

      - name: Download xray binary (authenticated, avoids API rate limit)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $asset = "Xray-windows-64.zip"
          $headers = @{
            "Authorization" = "Bearer $env:GH_TOKEN"
            "User-Agent"    = "drift-ci"
          }
          $release = Invoke-RestMethod "https://api.github.com/repos/XTLS/Xray-core/releases/latest" -Headers $headers
          $url = ($release.assets | Where-Object { $_.name -eq $asset }).browser_download_url
          Write-Host "Asset URL: $url"
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries/xray" | Out-Null
          Invoke-WebRequest $url -OutFile "$env:TEMP/xray.zip"
          Expand-Archive -Path "$env:TEMP/xray.zip" -DestinationPath "src-tauri/binaries/xray" -Force
          Get-ChildItem "src-tauri/binaries/xray" | Format-Table Name, Length

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: Drift-Windows-x64
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30
