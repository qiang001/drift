name: Build macOS

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x86_64
            label: Intel
          - runner: macos-14
            arch: aarch64
            label: AppleSilicon
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.label }} (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm deps (skip postinstall, we'll fetch xray manually)
        run: npm ci --ignore-scripts

      - name: Download xray binary (authenticated, avoids API rate limit)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -ex
          case "${{ matrix.arch }}" in
            x86_64)  ASSET="Xray-macos-64.zip" ;;
            aarch64) ASSET="Xray-macos-arm64-v8a.zip" ;;
            *) echo "Unknown arch ${{ matrix.arch }}"; exit 1 ;;
          esac
          URL=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/XTLS/Xray-core/releases/latest \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(next(a['browser_download_url'] for a in d['assets'] if a['name']=='$ASSET'))")
          echo "Asset URL: $URL"
          mkdir -p src-tauri/binaries/xray
          curl -fsSL "$URL" -o /tmp/xray.zip
          unzip -o /tmp/xray.zip -d src-tauri/binaries/xray/
          chmod +x src-tauri/binaries/xray/xray
          ls -la src-tauri/binaries/xray/
          file src-tauri/binaries/xray/xray

      - name: Build Tauri app
        run: npm run tauri build

      - name: List bundle contents
        if: always()
        shell: bash
        run: |
          APP=$(find src-tauri/target/release/bundle/macos -name "*.app" -type d 2>/dev/null | head -1)
          echo "App: $APP"
          if [ -n "$APP" ]; then
            echo "--- Resources/ ---"
            ls -la "$APP/Contents/Resources/" || true
            echo "--- find xray ---"
            find "$APP/Contents/Resources" -name "xray*" -o -name "geo*" || true
          fi

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Drift-macOS-${{ matrix.label }}-${{ matrix.arch }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30
