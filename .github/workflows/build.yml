name: Build macOS

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x86_64
            label: Intel
          - runner: macos-14
            arch: aarch64
            label: AppleSilicon
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.label }} (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm deps
        run: npm ci --ignore-scripts

      - name: Fetch xray binary (explicit, with verification)
        run: |
          node scripts/fetch-xray.mjs
          echo "--- src-tauri/binaries/xray/ ---"
          ls -la src-tauri/binaries/xray/
          test -f src-tauri/binaries/xray/xray || { echo "::error::xray binary missing after fetch"; exit 1; }
          chmod +x src-tauri/binaries/xray/xray
          file src-tauri/binaries/xray/xray

      - name: Build Tauri app
        run: npm run tauri build

      - name: Verify xray ended up in bundle
        run: |
          APP=$(find src-tauri/target/release/bundle/macos -name "*.app" | head -1)
          echo "App: $APP"
          ls -la "$APP/Contents/Resources/binaries/xray/" || true
          find "$APP/Contents/Resources" -name "xray" -type f

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Drift-macOS-${{ matrix.label }}-${{ matrix.arch }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30
